name: MLOps CI/CD

on:
  push:
    branches: [ main ]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Train and evaluate
        run: python Pipeline.py
      - name: Build Docker image
        run: docker build -t failure-predictor .
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_SOGEKING }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Docker image
        run: |
          docker tag failure-predictor ${{ secrets.DOCKER_USERNAME }}/failure-predictor:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/failure-predictor:latest